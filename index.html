<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OS Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .icon { font-size: 64px; margin-bottom: 16px; }

    h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .os-version {
      font-size: 28px;
      font-weight: 700;
      color: #4f46e5;
      margin: 16px 0;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      color: #555;
    }

    .detail-row:last-child { border-bottom: none; }
    .detail-row span:last-child { font-weight: 600; color: #1a1a2e; }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }

    .badge-yes { background: #d1fae5; color: #065f46; }
    .badge-no  { background: #fee2e2; color: #991b1b; }
    .badge-unknown { background: #e5e7eb; color: #374151; }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="os-icon">🔍</div>
    <h1>Your Operating System</h1>
    <div class="os-version" id="os-name">Detecting...</div>

    <div id="details"></div>

    <hr class="divider">

    <div id="win10-check" style="display:none;">
      <p style="font-size:14px; color:#555;">Is this Windows 10?</p>
      <div class="badge badge-unknown" id="win10-badge">Checking...</div>
    </div>

    <p class="note" id="note"></p>
  </div>

  <script>
    const icons = { Windows: "🪟", macOS: "🍎", Linux: "🐧", Android: "🤖", iOS: "📱", Unknown: "💻" };

    function parseUserAgent() {
      const ua = navigator.userAgent;
      let os = "Unknown", version = "Unknown";

      if (/Windows NT/.test(ua)) {
        os = "Windows";
        const match = ua.match(/Windows NT ([\d.]+)/);
        if (match) {
          const ntMap = { "10.0": "10 / 11", "6.3": "8.1", "6.2": "8", "6.1": "7", "6.0": "Vista", "5.1": "XP" };
          version = ntMap[match[1]] || match[1];
        }
      } else if (/Mac OS X/.test(ua)) {
        os = "macOS";
        const match = ua.match(/Mac OS X ([\d_]+)/);
        if (match) {
          const raw = match[1].replace(/_/g, ".");
          version = mapMacVersion(raw);
        }
      } else if (/Android/.test(ua)) {
        os = "Android";
        const match = ua.match(/Android ([\d.]+)/);
        version = match ? match[1] : "Unknown";
      } else if (/iPhone|iPad|iPod/.test(ua)) {
        os = "iOS";
        const match = ua.match(/OS ([\d_]+)/);
        version = match ? match[1].replace(/_/g, ".") : "Unknown";
      } else if (/Linux/.test(ua)) {
        os = "Linux";
        version = "Unknown";
      }

      return { os, version };
    }

    function mapMacVersion(raw) {
      const major = parseInt(raw.split(".")[0]);
      const minor = parseInt(raw.split(".")[1] || "0");

      // macOS 11+ uses major version directly
      if (major >= 11) {
        const names = { 11: "Big Sur", 12: "Monterey", 13: "Ventura", 14: "Sonoma", 15: "Sequoia" };
        return `${major} (${names[major] || "Unknown"})`;
      }

      // macOS 10.x
      if (major === 10) {
        const minorNames = {
          15: "Catalina", 14: "Mojave", 13: "High Sierra", 12: "Sierra",
          11: "El Capitan", 10: "Yosemite", 9: "Mavericks", 8: "Mountain Lion",
          7: "Lion", 6: "Snow Leopard"
        };
        return `10.${minor} (${minorNames[minor] || "Unknown"})`;
      }

      return raw;
    }

    function renderDetails(data) {
      const detailsEl = document.getElementById("details");
      const rows = Object.entries(data).map(([k, v]) => `
        <div class="detail-row">
          <span>${k}</span>
          <span>${v}</span>
        </div>
      `).join("");
      detailsEl.innerHTML = rows;
    }

    async function detect() {
      const { os, version } = parseUserAgent();

      document.getElementById("os-icon").textContent = icons[os] || icons.Unknown;
      document.getElementById("os-name").textContent = os;

      const details = {
        "OS Family": os,
        "Version (User-Agent)": version,
        "Browser": getBrowser(),
      };

      if (os === "Windows") {
        document.getElementById("win10-check").style.display = "block";

        if (navigator.userAgentData) {
          // Chromium — accurate
          try {
            const hint = await navigator.userAgentData.getHighEntropyValues(["platform", "platformVersion"]);
            const major = parseInt(hint.platformVersion.split(".")[0]);
            const isWin10 = major >= 1 && major < 13;
            const isWin11 = major >= 13;

            details["Version (Accurate)"] = isWin11 ? "Windows 11" : "Windows 10";
            document.getElementById("win10-badge").textContent = isWin10 ? "Yes — Windows 10" : "No — " + (isWin11 ? "Windows 11" : "Older");
            document.getElementById("win10-badge").className = "badge " + (isWin10 ? "badge-yes" : "badge-no");
            document.getElementById("note").textContent = "Detected using User-Agent Client Hints (accurate on Chromium browsers).";
          } catch (e) {
            fallbackWin10Check();
          }
        } else {
          fallbackWin10Check();
        }
      }

      if (os === "macOS") {
        document.getElementById("note").textContent =
          "Note: Chrome may report macOS version as 10.15.7 regardless of actual version due to privacy protections. Safari and Firefox are more accurate.";
      }

      renderDetails(details);
    }

    function fallbackWin10Check() {
      const ua = navigator.userAgent;
      const isNT10 = /Windows NT 10\.0/.test(ua);
      document.getElementById("win10-badge").textContent = isNT10
        ? "Likely Yes (cannot distinguish Win 10 vs 11 on this browser)"
        : "No";
      document.getElementById("win10-badge").className = "badge " + (isNT10 ? "badge-unknown" : "badge-no");
      document.getElementById("note").textContent =
        "This browser does not support User-Agent Client Hints. Windows 10 and 11 cannot be reliably distinguished.";
    }

    function getBrowser() {
      const ua = navigator.userAgent;
      if (/Edg\//.test(ua)) return "Microsoft Edge";
      if (/OPR\//.test(ua)) return "Opera";
      if (/Chrome\//.test(ua)) return "Chrome";
      if (/Firefox\//.test(ua)) return "Firefox";
      if (/Safari\//.test(ua) && !/Chrome/.test(ua)) return "Safari";
      return "Unknown";
    }

    detect();
  </script>
</body>
</html>
